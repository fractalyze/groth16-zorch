name: CI

permissions: read-all

on:
  push:
    branches: ["main", "benchmark-with-jax-v2"]
  pull_request:
    branches: ["main", "benchmark-with-jax-v2"]

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main or to an integration branch (benchmark-with-jax-v2)
# so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/benchmark-with-jax-v2' }}

jobs:
  test-cpu:
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4

      - name: Run CPU tests
        run: bazel --bazelrc=.bazelrc.ci test --config=ci --test_tag_filters=-gpu //...

  test-gpu:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: Run GPU tests
        run: bazel --bazelrc=.bazelrc.ci test --config=ci --test_tag_filters=gpu //...

  pre-commit-style:
    if: github.actor != 'fractalyze-dev'
    runs-on: [self-hosted, cpu]
    steps:
      - name: Checkout rabbitsnark-py
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Fetch base commit for pre-commit diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1

      - name: Checkout Setup Python
        uses: actions/setup-python@v4.7.0
        with:
          python-version: "3.10"

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --from-ref ${{ github.event.pull_request.base.sha || github.event.before }} --to-ref HEAD
