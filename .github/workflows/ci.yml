name: CI

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-cpu:
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4

      - name: Run CPU tests
        run: bazel --bazelrc=.bazelrc.ci test --config=ci --test_tag_filters=-gpu //...

  test-gpu:
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4

      - name: Run GPU tests
        run: bazel --bazelrc=.bazelrc.ci test --config=ci --test_tag_filters=gpu //...

  pre-commit-style:
    if: github.actor != 'fractalyze-dev'
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - name: Checkout rabbitsnark-py
        uses: actions/checkout@v4

      - name: Checkout Setup Python
        uses: actions/setup-python@v4.7.0
        with:
          python-version: "3.10"

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --from-ref ${{ github.event.pull_request.base.sha || github.event.before }} --to-ref HEAD
