name: JAX Update

on:
  repository_dispatch:
    types: [jax-update]

concurrency:
  group: jax-update
  cancel-in-progress: true

jobs:
  bump:
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Bump jax/jaxlib/zkx-cuda-pjrt
        uses: fractalyze/github-actions/pip-bump@main
        with:
          upstream_repo: jax
          version: ${{ github.event.client_payload.jax_version }}
          upstream_commit: ${{ github.event.client_payload.commit }}
          packages: jax jaxlib zkx-cuda-pjrt
          github_token: ${{ secrets.BUMPER_GH_PAT }}
