name: "Benchmark (trigger)"

permissions: read-all

on:
  issue_comment:
    types: [created]

jobs:
  benchmark:
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.body == '/benchmark'
    uses: ./.github/workflows/benchmark.yml
    with:
      pr_number: ${{ format('{0}', github.event.issue.number) }}
    secrets: inherit
