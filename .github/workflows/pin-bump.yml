name: Pin Bump

on:
  repository_dispatch:
    types: [pin-bump]

jobs:
  bump:
    if: github.event.client_payload.source_repo == 'r1cs-solver'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Bump r1cs-solver pin
        uses: fractalyze/github-actions/pin-bump@main
        with:
          upstream_repo: r1cs-solver
          upstream_commit: ${{ github.event.client_payload.commit }}
          pin_file: third_party/r1cs_solver/workspace.bzl
          var_prefix: R1CS_SOLVER
          github_token: ${{ secrets.BUMPER_GH_PAT }}
          read_token: ${{ secrets.FRACTALYZE_REPOS_READ_TOKEN }}
