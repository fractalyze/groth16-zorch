name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate-tag:
    name: Validate tag version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.MULTILINE)
          print(m.group(1))
          ")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

  build-wheel:
    name: Build wheel
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build setuptools wheel

      - name: Build wheel
        run: python -m build -w

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-rabbitsnark
          path: dist/*.whl

  upload-to-release:
    name: Upload to Release
    needs: [build-wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-rabbitsnark
          path: dist

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/*.whl --clobber \
            --repo ${{ github.repository }}

      - name: Trigger PyPI index rebuild
        env:
          GH_TOKEN: ${{ secrets.PYPI_REPO_TOKEN }}
        run: |
          gh api repos/fractalyze/pypi/dispatches \
            -f event_type=rebuild-index
