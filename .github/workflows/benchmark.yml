  #       with:
  #         benchmark_cmd: |
  #           JAX_PLATFORMS=cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
  #               --export_dir=/data/testdata/sp1-groth16/ \
  #               --deterministic --circuit=sp1 \
  #               --output=${{ github.workspace }}/groth16_cpu_benchmark_results.json
  #         device: cpu
  #         results_file: groth16_cpu_benchmark_results.json
  #         results_dir: benchmark_data_groth16_cpu
  #         baseline_path: benchmark_data_groth16_cpu/baseline.json
  #         anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
  #         dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
  #         slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
  #         store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}
  #
  #     - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
