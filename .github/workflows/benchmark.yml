name: Benchmark

permissions:
  contents: read
  actions: read
  checks: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      triggered_by:
        type: string
        required: false
        default: ""
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      triggered_by:
        type: string
        required: false
        default: ""

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr_number && format('pr-{0}', inputs.pr_number) || github.ref }}
  cancel-in-progress: ${{ inputs.pr_number != '' || github.ref != 'refs/heads/main' }}

jobs:
  notify-start:
    if: inputs.pr_number != ''
    runs-on: ubuntu-latest
    outputs:
      comment_id: ${{ steps.comment.outputs.comment_id }}
    steps:
      - name: Post PR comment with run link
        id: comment
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="**Benchmark started** :rocket:

          Follow progress: [Actions run #${{ github.run_id }}](${RUN_URL})

          _Triggered by @${{ inputs.triggered_by || github.triggering_actor }}_"
          gh api repos/${{ github.repository }}/issues/${{ inputs.pr_number }}/comments \
            -f body="${BODY}" \
            --jq '.id' | xargs -I{} echo "comment_id={}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  groth16-gpu:
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v7
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cuda,cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
                --export_dir=/data/testdata/sp1-groth16/ \
                --deterministic --circuit=sp1 \
                --output=${{ github.workspace }}/groth16_gpu_benchmark_results.json
          device: gpu
          results_file: groth16_gpu_benchmark_results.json
          results_dir: benchmark_data_groth16
          baseline_path: benchmark_data_groth16/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-groth16-gpu
          path: groth16_gpu_benchmark_results.json
          retention-days: 90

  # TODO(chokobole): Re-enable groth16-cpu
  # groth16-cpu:
  #   needs: groth16-gpu
  #   runs-on: [self-hosted, rabbitsnark-py]
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0
  #         clean: false
  #         ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}
  #
  #     - uses: fractalyze/benchmark-action@v7
  #       with:
  #         benchmark_cmd: |
  #           JAX_PLATFORMS=cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
  #               --export_dir=/data/testdata/sp1-groth16/ \
  #               --deterministic --circuit=sp1 \
  #               --output=${{ github.workspace }}/groth16_cpu_benchmark_results.json
  #         device: cpu
  #         results_file: groth16_cpu_benchmark_results.json
  #         results_dir: benchmark_data_groth16_cpu
  #         baseline_path: benchmark_data_groth16_cpu/baseline.json
  #         anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
  #         dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
  #         slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
  #         store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}
  #
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: benchmark-groth16-cpu
  #         path: groth16_cpu_benchmark_results.json
  #         retention-days: 90

  primitives-gpu:
    needs: groth16-gpu
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v7
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cuda,cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:primitives_benchmark -- \
                --sizes=16,18,20,22 \
                --output=${{ github.workspace }}/primitives_gpu_benchmark_results.json
          device: gpu
          results_file: primitives_gpu_benchmark_results.json
          results_dir: benchmark_data_primitives
          baseline_path: benchmark_data_primitives/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-primitives-gpu
          path: primitives_gpu_benchmark_results.json
          retention-days: 90

  primitives-cpu:
    needs: primitives-gpu
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v7
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:primitives_benchmark -- \
                --sizes=16,18,20,22 \
                --output=${{ github.workspace }}/primitives_cpu_benchmark_results.json
          device: cpu
          results_file: primitives_cpu_benchmark_results.json
          results_dir: benchmark_data_primitives_cpu
          baseline_path: benchmark_data_primitives_cpu/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-primitives-cpu
          path: primitives_cpu_benchmark_results.json
          retention-days: 90

  notify-end:
    if: always() && inputs.pr_number != ''
    needs: [notify-start, primitives-cpu]
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "label=failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "outcome=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=:no_entry_sign:" >> "$GITHUB_OUTPUT"
            echo "label=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=success" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "label=completed successfully" >> "$GITHUB_OUTPUT"
          fi

      - name: Edit PR comment with final status
        if: needs.notify-start.outputs.comment_id != ''
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="**Benchmark ${{ steps.status.outputs.label }}** ${{ steps.status.outputs.emoji }}

          Results: [Actions run #${{ github.run_id }}](${RUN_URL})

          _Triggered by @${{ inputs.triggered_by || github.triggering_actor }}_"
          gh api repos/${{ github.repository }}/issues/comments/${{ needs.notify-start.outputs.comment_id }} \
            -X PATCH -f body="${BODY}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Send Slack DM to triggering user
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_SLACK_USER_MAP: ${{ secrets.GITHUB_SLACK_USER_MAP }}
          GITHUB_USER: ${{ inputs.triggered_by || github.triggering_actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ inputs.pr_number }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO_NAME: ${{ github.repository }}
          STATUS: ${{ steps.status.outputs.label }}
          EMOJI: ${{ steps.status.outputs.emoji }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ] || [ -z "$GITHUB_SLACK_USER_MAP" ]; then
            echo "Slack bot token or user map not set, skipping DM"
            exit 0
          fi

          python3 - <<'PYEOF'
          import json, os, urllib.request

          token = os.environ["SLACK_BOT_TOKEN"]
          user_map = json.loads(os.environ["GITHUB_SLACK_USER_MAP"])
          github_user = os.environ["GITHUB_USER"]
          slack_user_id = user_map.get(github_user)

          if not slack_user_id:
              print(f"No Slack mapping for '{github_user}', skipping DM")
              raise SystemExit(0)

          def slack_api(method, payload):
              req = urllib.request.Request(
                  f"https://slack.com/api/{method}",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read())

          dm = slack_api("conversations.open", {"users": slack_user_id})
          if not dm.get("ok"):
              print(f"Failed to open DM: {dm.get('error')}")
              raise SystemExit(0)

          channel = dm["channel"]["id"]
          emoji = os.environ.get("EMOJI", "")
          status = os.environ.get("STATUS", "")
          repo = os.environ.get("REPO_NAME", "")
          pr_url = os.environ.get("PR_URL", "")
          pr_number = os.environ.get("PR_NUMBER", "")
          run_url = os.environ.get("RUN_URL", "")

          text = f"{emoji} *Benchmark {status}*\n*Repo:* {repo}\n*PR:* <{pr_url}|#{pr_number}>\n*Run:* <{run_url}|View results>"
          result = slack_api("chat.postMessage", {
              "channel": channel,
              "blocks": [{"type": "section", "text": {"type": "mrkdwn", "text": text}}],
              "text": f"Benchmark {status}",
          })

          if result.get("ok"):
              print(f"Slack DM sent to {slack_user_id}")
          else:
              print(f"Slack DM failed: {result.get('error')}")
          PYEOF
