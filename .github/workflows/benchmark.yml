  primitives-gpu:
    needs: groth16-gpu
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v7
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cuda,cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:primitives_benchmark -- \
                --sizes=16,18,20,22 \
                --output=${{ github.workspace }}/primitives_gpu_benchmark_results.json
          device: gpu
          results_file: primitives_gpu_benchmark_results.json
          results_dir: benchmark_data_primitives
          baseline_path: benchmark_data_primitives/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-primitives-gpu
          path: primitives_gpu_benchmark_results.json
          retention-days: 90

  primitives-cpu:
    needs: primitives-gpu
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

