name: Benchmark

permissions:
  contents: read
  actions: read
  checks: read

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  groth16-gpu:
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - uses: fractalyze/benchmark-action@v2
        with:
          benchmark_cmd: |
            bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
                --export_dir=/data/sp1-groth16/testdata/export/ \
                --deterministic --circuit=sp1 \
                --iterations=3 --warmup=1 \
                --zkbench --output=${{ github.workspace }}/benchmark_results.json
          device: gpu
          regression_threshold: "0.15"
          rolling_window: "5"
          cpu_load_threshold: "0.80"
          memory_threshold: "0.80"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-groth16-gpu
          path: benchmark_results.json
          retention-days: 90
