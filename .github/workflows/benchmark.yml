name: Benchmark

permissions:
  contents: read
  actions: read
  checks: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      triggered_by:
        type: string
        required: false
        default: ""
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      triggered_by:
        type: string
        required: false
        default: ""

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr_number && format('pr-{0}', inputs.pr_number) || github.ref }}
  cancel-in-progress: ${{ inputs.pr_number != '' || github.ref != 'refs/heads/main' }}

jobs:
  notify-start:
    if: inputs.pr_number != ''
    runs-on: ubuntu-latest
    outputs:
      comment_id: ${{ steps.notify.outputs.comment_id }}
    steps:
      - uses: fractalyze/benchmark-action/notify@v9
        id: notify
        with:
          mode: start
          pr_number: ${{ inputs.pr_number }}
          triggered_by: ${{ inputs.triggered_by || github.triggering_actor }}
          github_pat: ${{ secrets.ISSUE_REACTOR_GH_PAT }}

  groth16-gpu:
    runs-on: [self-hosted, bench]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v9
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cuda,cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
                --export_dir=/data/testdata/sp1-groth16/ \
                --deterministic --circuit=sp1 \
                --output=${{ github.workspace }}/groth16_gpu_benchmark_results.json
          device: gpu
          results_file: groth16_gpu_benchmark_results.json
          results_dir: benchmark_data_groth16
          baseline_path: benchmark_data_groth16/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-groth16-gpu
          path: groth16_gpu_benchmark_results.json
          retention-days: 90

  # TODO(chokobole): Re-enable groth16-cpu
  # groth16-cpu:
  #   needs: groth16-gpu
  #   runs-on: [self-hosted, rabbitsnark-py]
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0
  #         clean: false
  #         ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}
  #
  #     - uses: fractalyze/benchmark-action@v9
  #       with:
  #         benchmark_cmd: |
  #           JAX_PLATFORMS=cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
  #               --export_dir=/data/testdata/sp1-groth16/ \
  #               --deterministic --circuit=sp1 \
  #               --output=${{ github.workspace }}/groth16_cpu_benchmark_results.json
  #         device: cpu
  #         results_file: groth16_cpu_benchmark_results.json
  #         results_dir: benchmark_data_groth16_cpu
  #         baseline_path: benchmark_data_groth16_cpu/baseline.json
  #         anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
  #         dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
  #         slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
  #         store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}
  #
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: benchmark-groth16-cpu
  #         path: groth16_cpu_benchmark_results.json
  #         retention-days: 90

  primitives-gpu:
    needs: groth16-gpu
    runs-on: [self-hosted, bench]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v9
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cuda,cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:primitives_benchmark -- \
                --sizes=16,18,20,22 \
                --output=${{ github.workspace }}/primitives_gpu_benchmark_results.json
          device: gpu
          results_file: primitives_gpu_benchmark_results.json
          results_dir: benchmark_data_primitives
          baseline_path: benchmark_data_primitives/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-primitives-gpu
          path: primitives_gpu_benchmark_results.json
          retention-days: 90

  primitives-cpu:
    needs: primitives-gpu
    runs-on: [self-hosted, bench]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v9
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:primitives_benchmark -- \
                --sizes=16,18,20,22 \
                --output=${{ github.workspace }}/primitives_cpu_benchmark_results.json
          device: cpu
          results_file: primitives_cpu_benchmark_results.json
          results_dir: benchmark_data_primitives_cpu
          baseline_path: benchmark_data_primitives_cpu/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-primitives-cpu
          path: primitives_cpu_benchmark_results.json
          retention-days: 90

  notify-end:
    if: always() && inputs.pr_number != ''
    needs: [notify-start, groth16-gpu, primitives-gpu, primitives-cpu]
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "label=failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "outcome=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=:no_entry_sign:" >> "$GITHUB_OUTPUT"
            echo "label=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=success" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "label=completed successfully" >> "$GITHUB_OUTPUT"
          fi

      - uses: fractalyze/benchmark-action/notify@v9
        with:
          mode: end
          pr_number: ${{ inputs.pr_number }}
          triggered_by: ${{ inputs.triggered_by || github.triggering_actor }}
          github_pat: ${{ secrets.ISSUE_REACTOR_GH_PAT }}
          comment_id: ${{ needs.notify-start.outputs.comment_id }}
          status: ${{ steps.status.outputs.label }}
          status_emoji: ${{ steps.status.outputs.emoji }}
          slack_bot_token: ${{ secrets.BENCHMARK_NOTIFIER_SLACK_BOT_TOKEN }}
          github_slack_user_map: ${{ vars.SLACK_USER_MAP }}
