name: Benchmark

permissions:
  contents: read
  actions: read
  checks: read
  issues: write

on:
  schedule:
    - cron: '0 20 * * *'  # 20:00 UTC = 05:00 KST
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      triggered_by:
        type: string
        required: false
        default: ""
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      triggered_by:
        type: string
        required: false
        default: ""

concurrency:
  group: benchmark-runner
  cancel-in-progress: false

jobs:
  notify-start:
    if: inputs.pr_number != ''
    runs-on: ubuntu-latest
    outputs:
      comment_id: ${{ steps.notify.outputs.comment_id }}
    steps:
      - uses: fractalyze/benchmark-action/notify@v9
        id: notify
        with:
          mode: start
          pr_number: ${{ inputs.pr_number }}
          triggered_by: ${{ inputs.triggered_by || github.triggering_actor }}
          github_pat: ${{ secrets.ISSUE_REACTOR_GH_PAT }}

  groth16-gpu:
    runs-on: [self-hosted, bench]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - name: Resolve r1cs-solver commit
        id: r1cs_commit
        run: |
          COMMIT=$(awk -F'"' '/R1CS_SOLVER_COMMIT =/{print $2}' third_party/r1cs_solver/workspace.bzl | tr -d '\r\n ')
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::Invalid r1cs-solver commit hash: ${COMMIT}"
            exit 1
          fi
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Pull benchmark runner image
        run: docker pull ghcr.io/fractalyze/benchmark-runner:latest

      - name: Pre-download private repo archives for Bazel
        run: |
          mkdir -p /tmp/distdir
          COMMIT="${{ steps.r1cs_commit.outputs.commit }}"
          curl -fsS --location-trusted -H "Authorization: token ${GITHUB_PAT}" \
            "https://github.com/fractalyze/r1cs-solver/archive/${COMMIT}.tar.gz" \
            -o "/tmp/distdir/${COMMIT}.tar.gz"
        env:
          GITHUB_PAT: ${{ secrets.PRIVATE_REPO_PAT }}

      - uses: fractalyze/benchmark-action@v9
        with:
          benchmark_cmd: |
            docker run --rm \
              --cpuset-cpus=0-15 \
              --memory=32g \
              --gpus=all \
              --network=host \
              -v ${{ github.workspace }}:/workspace \
              -v /data:/data \
              -v /data/bazel-benchmark-cache:/root/.cache/bazel \
              -v /tmp/distdir:/distdir:ro \
              -w /workspace \
              -e JAX_PLATFORMS=cuda,cpu \
              -e JAX_COMPILATION_CACHE_DIR=/data/jax_cache \
              -e JAX_PERSISTENT_CACHE_ENABLE_ZKX_CACHES=zkx_gpu_kernel_cache_file \
              ghcr.io/fractalyze/benchmark-runner:latest \
              bash -c 'bazel --bazelrc=.bazelrc.ci run --config=ci --distdir=/distdir //benchmark:sp1_groth16 -- --export_dir=/data/testdata/sp1-groth16/ --deterministic --circuit=sp1 --output=/workspace/groth16_gpu_benchmark_results.json'
          device: gpu
          results_file: groth16_gpu_benchmark_results.json
          results_dir: benchmark_data_groth16
          baseline_path: benchmark_data_groth16/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-groth16-gpu
          path: groth16_gpu_benchmark_results.json
          retention-days: 7

