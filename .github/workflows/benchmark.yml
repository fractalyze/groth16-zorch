  primitives-gpu:
    needs: groth16-gpu
    runs-on: [self-hosted, bench]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - name: Resolve r1cs-solver commit
        id: r1cs_commit
        run: |
          COMMIT=$(awk -F'"' '/R1CS_SOLVER_COMMIT =/{print $2}' third_party/r1cs_solver/workspace.bzl | tr -d '\r\n ')
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::Invalid r1cs-solver commit hash: ${COMMIT}"
            exit 1
          fi
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Pull benchmark runner image
        run: docker pull ghcr.io/fractalyze/benchmark-runner:latest

      - name: Pre-download private repo archives for Bazel
        run: |
          mkdir -p /tmp/distdir
          COMMIT="${{ steps.r1cs_commit.outputs.commit }}"
          curl -fsS --location-trusted -H "Authorization: token ${GITHUB_PAT}" \
            "https://github.com/fractalyze/r1cs-solver/archive/${COMMIT}.tar.gz" \
            -o "/tmp/distdir/${COMMIT}.tar.gz"
        env:
          GITHUB_PAT: ${{ secrets.PRIVATE_REPO_PAT }}

      - uses: fractalyze/benchmark-action@v9
        with:
          benchmark_cmd: |
            docker run --rm \
              --cpuset-cpus=0-15 \
              --memory=32g \
              --gpus=all \
              --network=host \
              -v ${{ github.workspace }}:/workspace \
              -v /data:/data \
              -v /data/bazel-benchmark-cache:/root/.cache/bazel \
              -v /tmp/distdir:/distdir:ro \
              -w /workspace \
              -e JAX_PLATFORMS=cuda,cpu \
              -e JAX_COMPILATION_CACHE_DIR=/data/jax_cache \
              -e JAX_PERSISTENT_CACHE_ENABLE_ZKX_CACHES=zkx_gpu_kernel_cache_file \
              ghcr.io/fractalyze/benchmark-runner:latest \
              bash -c 'bazel --bazelrc=.bazelrc.ci run --config=ci --distdir=/distdir //benchmark:primitives_benchmark -- --sizes=16,18,20,22 --output=/workspace/primitives_gpu_benchmark_results.json'
          device: gpu
          results_file: primitives_gpu_benchmark_results.json
          results_dir: benchmark_data_primitives
          baseline_path: benchmark_data_primitives/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-primitives-gpu
          path: primitives_gpu_benchmark_results.json
          retention-days: 7

  primitives-cpu:
    needs: primitives-gpu
    runs-on: [self-hosted, bench]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - name: Resolve r1cs-solver commit
        id: r1cs_commit
        run: |
          COMMIT=$(awk -F'"' '/R1CS_SOLVER_COMMIT =/{print $2}' third_party/r1cs_solver/workspace.bzl | tr -d '\r\n ')
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::Invalid r1cs-solver commit hash: ${COMMIT}"
            exit 1
          fi
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Pull benchmark runner image
        run: docker pull ghcr.io/fractalyze/benchmark-runner:latest

      - name: Pre-download private repo archives for Bazel
        run: |
          mkdir -p /tmp/distdir
          COMMIT="${{ steps.r1cs_commit.outputs.commit }}"
          curl -fsS --location-trusted -H "Authorization: token ${GITHUB_PAT}" \
            "https://github.com/fractalyze/r1cs-solver/archive/${COMMIT}.tar.gz" \
            -o "/tmp/distdir/${COMMIT}.tar.gz"
        env:
          GITHUB_PAT: ${{ secrets.PRIVATE_REPO_PAT }}

      - uses: fractalyze/benchmark-action@v9
        with:
          benchmark_cmd: |
            docker run --rm \
              --cpuset-cpus=0-15 \
              --memory=32g \
              --gpus=all \
              --network=host \
              -v ${{ github.workspace }}:/workspace \
              -v /data:/data \
              -v /data/bazel-benchmark-cache:/root/.cache/bazel \
              -v /tmp/distdir:/distdir:ro \
              -w /workspace \
              -e JAX_PLATFORMS=cpu \
              -e JAX_COMPILATION_CACHE_DIR=/data/jax_cache \
              -e JAX_PERSISTENT_CACHE_ENABLE_ZKX_CACHES=zkx_gpu_kernel_cache_file \
              ghcr.io/fractalyze/benchmark-runner:latest \
              bash -c 'bazel --bazelrc=.bazelrc.ci run --config=ci --distdir=/distdir //benchmark:primitives_benchmark -- --sizes=16,18,20,22 --output=/workspace/primitives_cpu_benchmark_results.json'
          device: cpu
          results_file: primitives_cpu_benchmark_results.json
          results_dir: benchmark_data_primitives_cpu
          baseline_path: benchmark_data_primitives_cpu/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-primitives-cpu
          path: primitives_cpu_benchmark_results.json
          retention-days: 7

  notify-end:
    if: always() && inputs.pr_number != ''
    needs: [notify-start, groth16-gpu, primitives-gpu, primitives-cpu]
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "label=failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "outcome=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=:no_entry_sign:" >> "$GITHUB_OUTPUT"
            echo "label=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=success" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "label=completed successfully" >> "$GITHUB_OUTPUT"
          fi

      - uses: fractalyze/benchmark-action/notify@v9
        with:
          mode: end
          pr_number: ${{ inputs.pr_number }}
          triggered_by: ${{ inputs.triggered_by || github.triggering_actor }}
          github_pat: ${{ secrets.ISSUE_REACTOR_GH_PAT }}
          comment_id: ${{ needs.notify-start.outputs.comment_id }}
          status: ${{ steps.status.outputs.label }}
          status_emoji: ${{ steps.status.outputs.emoji }}
          slack_bot_token: ${{ secrets.BENCHMARK_NOTIFIER_SLACK_BOT_TOKEN }}
          github_slack_user_map: ${{ vars.SLACK_USER_MAP }}
