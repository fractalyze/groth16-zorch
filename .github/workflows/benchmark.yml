name: Benchmark

permissions:
  contents: read
  actions: read
  checks: read

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""

# Cancel in-progress runs for PRs (same head branch), but never cancel
# pushes to main so that every merge gets a full CI run.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr_number && format('pr-{0}', inputs.pr_number) || github.ref }}
  cancel-in-progress: ${{ inputs.pr_number != '' || github.ref != 'refs/heads/main' }}

jobs:
  groth16-gpu:
    runs-on: [self-hosted, rabbitsnark-py]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || '' }}

      - uses: fractalyze/benchmark-action@v7
        with:
          benchmark_cmd: |
            JAX_PLATFORMS=cuda,cpu bazel --bazelrc=.bazelrc.ci run --config=ci //benchmark:sp1_groth16 -- \
                --export_dir=/data/testdata/sp1-groth16/ \
                --deterministic --circuit=sp1 \
                --output=${{ github.workspace }}/groth16_gpu_benchmark_results.json
          device: gpu
          results_file: groth16_gpu_benchmark_results.json
          results_dir: benchmark_data_groth16
          baseline_path: benchmark_data_groth16/baseline.json
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          dashboard_token: ${{ secrets.DASHBOARD_TOKEN }}
          slack_webhook: ${{ secrets.SLACK_BENCHMARK_WEBHOOK }}
          store_results: ${{ !inputs.pr_number && github.ref == 'refs/heads/main' }}

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-groth16-gpu
          path: groth16_gpu_benchmark_results.json
          retention-days: 90

