repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: debug-statements
    -   id: name-tests-test
        exclude: testutil\.py
    -   id: requirements-txt-fixer
        exclude: requirements(_rocm)?_lock_.*\.txt
-   repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
    -   id: black
        args: ["-l", "88"]
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --select=E501, --select=I, --select=F401]
