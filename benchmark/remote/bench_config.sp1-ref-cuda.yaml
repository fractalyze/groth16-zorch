# Benchmark-on-rented-gpu plugin config for the sp1-ref-cuda image
# (built and published by fractalyze/sp1#25 — not yet available).
#
# RABBIT-SIDE SCOPE: only the Go targets (sp1-groth16-bench: groth16
# / solve / primitives) live here, because rabbit's cross-impl gates
# cover groth16, fft, ifft, msm_g1. The image itself ALSO bundles
# Rust GPU benchmarks (logup_gkr, zerocheck, merkle, poseidon2) for
# whir-zorch's cross-impl gates — those targets belong in
# fractalyze/whir-zorch's bench_config.sp1-ref-cuda.yaml, not here.
#
# image_sha pins the SP1 ref source the image was built from so a
# measurement run is reproducible week-to-week.
#
# See benchmark/CONTRACT.md ("bench_config.<target>.yaml schema").

name: sp1-ref-cuda-gnark-side
description: |
  SP1 ref's gnark-based Go binaries on NVIDIA sm_120 (RTX 5090).
  Sourced from fractalyze/sp1@ref; produces `gnark`-tagged JSONs
  (metadata.implementation = "gnark"). Routed by sp1#25's planned
  ENTRYPOINT dispatcher.

# Image not yet published — sp1#25 owns the build.
image: ghcr.io/fractalyze/sp1-ref:cuda-latest
image_sha: 7ba51b50c9064c0bd9b22abf1327b76f0346edc5  # fractalyze/sp1@ref HEAD as of 2026-05-30

hardware:
  vendor: nvidia
  arch: sm_120
  min_gpu_ram_gb: 32

budget:
  max_dollars: 5.00
  max_runtime_minutes: 30

fixture:
  # local_path is the host directory holding the gnark export tree
  # (witness_full.bin, term matrices, …). Override per host via the
  # orchestrator's --fixture-dir flag or RABBIT_FIXTURE_DIR env. The
  # default is a repo-relative path for documentation only.
  local_path: ./testdata/sp1-groth16
  container_path: /data/sp1-groth16

targets:
  - name: groth16
    container_args:
      - groth16
      - --data-dir=/data/sp1-groth16
      - --deterministic
      - --warmup=2
      - --iterations=10
      - --zkbench
      - --output=/output/groth16.json
    output_path: /output/groth16.json
    produces: [groth16_sp1_verifier]

  - name: solve
    container_args:
      - solve
      - --data-dir=/data/sp1-groth16
      - --warmup=1
      - --iterations=3
      - --zkbench
      - --output=/output/solve.json
    output_path: /output/solve.json
    produces: [groth16_sp1_verifier_solver]

  - name: primitives
    container_args:
      - primitives
      - --sizes=20
      - --iterations=5
      - --warmup=1
      - --output=/output/primitives.json
    output_path: /output/primitives.json
    produces: [fft, ifft, msm_g1]
